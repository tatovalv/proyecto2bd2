name: gdelt-analytics

services:
  # --- Almacenamiento: Parquet en volumen compartido ---
  # Los datos RAW se guardan en /data/parquet (equivalente funcional a HDFS para este proyecto)

  mongodb:
    image: mongo:7
    container_name: gdelt-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: gdelt2026
      MONGO_INITDB_DATABASE: gdelt_analytics
    networks:
      - gdelt-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-master:
    image: bitnamilegacy/spark:3.5.3
    container_name: gdelt-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - parquet_data:/data/parquet
      - ./spark:/opt/spark-jobs
    networks:
      - gdelt-net

  spark-worker-1:
    image: bitnamilegacy/spark:3.5.3
    container_name: gdelt-spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    depends_on:
      - spark-master
    volumes:
      - parquet_data:/data/parquet
      - ./spark:/opt/spark-jobs
    networks:
      - gdelt-net

  spark-worker-2:
    image: bitnamilegacy/spark:3.5.3
    container_name: gdelt-spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    depends_on:
      - spark-master
    volumes:
      - parquet_data:/data/parquet
      - ./spark:/opt/spark-jobs
    networks:
      - gdelt-net

  loader:
    build: ./loader
    container_name: gdelt-loader
    environment:
      - PARQUET_PATH=/data/parquet
      - RAW_RETENTION_HOURS=1
      - GDELT_BASE_URL=http://data.gdeltproject.org/gdeltv2
    volumes:
      - parquet_data:/data/parquet
    networks:
      - gdelt-net
    restart: unless-stopped

  spark-analysis:
    build: ./spark
    container_name: gdelt-spark-analysis
    profiles: ["manual"]
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - PARQUET_PATH=/data/parquet
      - MONGO_URI=mongodb://admin:gdelt2026@mongodb:27017/gdelt_analytics?authSource=admin
    volumes:
      - parquet_data:/data/parquet
      - ./spark:/opt/spark-jobs
    depends_on:
      spark-master:
        condition: service_started
      mongodb:
        condition: service_healthy
    networks:
      - gdelt-net
  # Se ejecuta bajo demanda o vía Airflow; no reinicia automáticamente

  airflow-init:
    build: ./airflow
    container_name: gdelt-airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=8KzqJ8vZxK9mN2pL5qR7sT0uV3wX6yA9bC1dE4fG7h=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=false
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@gdelt.local || true
    networks:
      - gdelt-net

  airflow-webserver:
    build: ./airflow
    container_name: gdelt-airflow-web
    ports:
      - "8081:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=8KzqJ8vZxK9mN2pL5qR7sT0uV3wX6yA9bC1dE4fG7h=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=false
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow webserver
    networks:
      - gdelt-net
    restart: unless-stopped

  airflow-scheduler:
    build: ./airflow
    container_name: gdelt-airflow-scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=8KzqJ8vZxK9mN2pL5qR7sT0uV3wX6yA9bC1dE4fG7h=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=false
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow scheduler
    networks:
      - gdelt-net
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: gdelt-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gdelt-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard:
    build: ./dashboard
    container_name: gdelt-dashboard
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://admin:gdelt2026@mongodb:27017/gdelt_analytics?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - gdelt-net
    restart: unless-stopped

volumes:
  parquet_data:
  mongo_data:
  postgres_data:
  airflow_logs:

networks:
  gdelt-net:
    driver: bridge
